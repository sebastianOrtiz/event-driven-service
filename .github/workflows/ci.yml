name: CI - Event Driven Service

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build-test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Lint
        run: go vet ./...

      - name: Build API
        run: go build ./cmd/api

      - name: Build Worker
        run: go build ./cmd/worker

      - name: Tests
        run: go test ./... -v
